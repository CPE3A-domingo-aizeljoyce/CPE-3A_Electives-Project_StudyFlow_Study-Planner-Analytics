services:
  - type: web
    name: acadflu
    env: node
    rootDir: BACKEND
    buildCommand: npm install
    startCommand: node server.js

  - type: static
    name: acadflu-frontend
    rootDir: FRONTEND
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html